<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@latest/dist/full.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="bg-gray-800 text-white p-4 flex justify-between items-center">
        <h1 class="text-xl">My Portfolio</h1>
        <button id="theme-toggle" class="btn btn-primary">Toggle Dark/Light Mode</button>
    </header>

    <main class="p-4">
        <section id="projects" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- Project Cards will be inserted here via JavaScript -->
        </section>
    </main>

    <footer class="text-center p-4">
        <p>&copy; 2025 My Portfolio</p>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
