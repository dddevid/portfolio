<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dddevid - Portfolio</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/daisyui/4.6.0/full.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <style>
        .project-card {
            opacity: 0;
            transform: translateY(20px);
        }
        
        .neon-effect:hover {
            box-shadow: 0 0 10px theme('colors.primary'), 0 0 20px theme('colors.primary');
        }

        .neon-text {
            text-shadow: 0 0 5px theme('colors.primary');
        }

        @media (min-width: 1024px) {
            .main-container {
                display: grid;
                grid-template-columns: 300px 1fr;
                min-height: 100vh;
            }

            .sidebar {
                position: fixed;
                width: 300px;
                height: 100vh;
            }

            .content {
                margin-left: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- Sidebar/Header Section -->
        <div class="sidebar bg-base-200 p-6 flex flex-col">
            <div class="sticky top-6">
                <h1 class="text-4xl font-bold mb-4 neon-text">dddevid</h1>
                <div class="text-xl mb-8">Portfolio</div>
                <p class="mb-6 text-base-content/80">Una collezione dei miei progetti di sviluppo software</p>
                
                <label class="swap swap-rotate btn btn-ghost btn-circle">
                    <input type="checkbox" id="themeToggle" />
                    <svg class="swap-on h-6 w-6 fill-current" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M5.64,17l-.71.71a1,1,0,0,0,0,1.41,1,1,0,0,0,1.41,0l.71-.71A1,1,0,0,0,5.64,17ZM5,12a1,1,0,0,0-1-1H3a1,1,0,0,0,0,2H4A1,1,0,0,0,5,12Zm7-7a1,1,0,0,0,1-1V3a1,1,0,0,0-2,0V4A1,1,0,0,0,12,5ZM5.64,7.05a1,1,0,0,0,.7.29,1,1,0,0,0,.71-.29,1,1,0,0,0,0-1.41l-.71-.71A1,1,0,0,0,4.93,6.34Zm12,.29a1,1,0,0,0,.7-.29l.71-.71a1,1,0,1,0-1.41-1.41L17,5.64a1,1,0,0,0,0,1.41A1,1,0,0,0,17.66,7.34ZM21,11H20a1,1,0,0,0,0,2h1a1,1,0,0,0,0-2Zm-9,8a1,1,0,0,0-1,1v1a1,1,0,0,0,2,0V20A1,1,0,0,0,12,19ZM18.36,17A1,1,0,0,0,17,18.36l.71.71a1,1,0,0,0,1.41,0,1,1,0,0,0,0-1.41ZM12,6.5A5.5,5.5,0,1,0,17.5,12,5.51,5.51,0,0,0,12,6.5Zm0,9A3.5,3.5,0,1,1,15.5,12,3.5,3.5,0,0,1,12,15.5Z"/></svg>
                    <svg class="swap-off h-6 w-6 fill-current" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M21.64,13a1,1,0,0,0-1.05-.14,8.05,8.05,0,0,1-3.37.73A8.15,8.15,0,0,1,9.08,5.49a8.59,8.59,0,0,1,.25-2A1,1,0,0,0,8,2.36,10.14,10.14,0,1,0,22,14.05,1,1,0,0,0,21.64,13Zm-9.5,6.69A8.14,8.14,0,0,1,7.08,5.22v.27A10.15,10.15,0,0,0,17.22,15.63a9.79,9.79,0,0,0,2.1-.22A8.11,8.11,0,0,1,12.14,19.73Z"/></svg>
                </label>

                <div class="mt-auto text-sm text-base-content/60 pt-8">
                    Made with ❤️ by dddevid
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="content bg-base-100 p-6">
            <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6" id="projectsGrid">
                <!-- Projects will be inserted here by JavaScript -->
            </div>
        </div>
    </div>

    <script>
        const projects = [
            {
                title: "Roblox Freezing Fix",
                description: "Utility per risolvere i problemi di freeze su Roblox",
                tech: ["Python", "System Utilities"],
                github: "https://github.com/dddevid/Roblox-Freezing-Fix"
            },
            {
                title: "Minecraft Server Info",
                description: "Tool per ottenere informazioni sui server Minecraft",
                tech: ["Python", "Networking"],
                github: "https://github.com/dddevid/Minecraft-Server-Info"
            },
            {
                title: "OnlineMusicPlayer",
                description: "Player musicale online con interfaccia moderna",
                tech: ["Web Audio API", "JavaScript"],
                github: "https://github.com/dddevid/OnlineMusicPlayer"
            },
            {
                title: "TiktokCoinConverter",
                description: "Convertitore di valuta per TikTok Coins",
                tech: ["JavaScript", "Currency API"],
                github: "https://github.com/dddevid/tiktokcoinconverter"
            },
            {
                title: "PassChecker",
                description: "Strumento per verificare la sicurezza delle password",
                tech: ["Python", "Security"],
                github: "https://github.com/dddevid/PassChecker"
            },
            {
                title: "DevSpeedTest",
                description: "Tester di velocità internet personalizzato",
                tech: ["Python", "Networking"],
                github: "https://github.com/dddevid/DevSpeedTest"
            },
            {
                title: "YTDLPY",
                description: "Download manager per contenuti YouTube",
                tech: ["Python", "YouTube API"],
                github: "https://github.com/dddevid/YTDLPY"
            }
        ];

        function createProjectCards() {
            const projectsGrid = document.getElementById('projectsGrid');
            projects.forEach(project => {
                const card = document.createElement('div');
                card.className = 'project-card card bg-base-200 shadow-xl hover:shadow-2xl transition-all duration-300 neon-effect';
                
                card.innerHTML = `
                    <div class="card-body">
                        <h2 class="card-title">${project.title}</h2>
                        <p>${project.description}</p>
                        <div class="flex flex-wrap gap-2 my-2">
                            ${project.tech.map(tech => `
                                <div class="badge badge-primary badge-outline">${tech}</div>
                            `).join('')}
                        </div>
                        <div class="card-actions justify-end">
                            <a href="${project.github}" target="_blank" rel="noopener noreferrer" 
                               class="btn btn-primary btn-outline">
                                <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
                                </svg>
                                Vedi su GitHub
                            </a>
                        </div>
                    </div>
                `;
                
                projectsGrid.appendChild(card);
            });
        }

        // Theme toggle functionality
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('change', () => {
            document.documentElement.setAttribute('data-theme', 
                themeToggle.checked ? 'light' : 'dark');
            
            anime({
                targets: '.swap',
                rotate: '360deg',
                duration: 1000,
                easing: 'easeInOutQuad'
            });
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            createProjectCards();
            
            anime({
                targets: '.project-card',
                translateY: [20, 0],
                opacity: [0, 1],
                delay: anime.stagger(100),
                easing: 'easeOutExpo',
                duration: 800
            });
        });
    </script>
</body>
</html>
